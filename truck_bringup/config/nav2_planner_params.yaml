# =============================================================================
# Nav2 Planner Server + Global Costmap for the truck AMR
#
# Philosophy: NavFn produces a FAST, APPROXIMATE, UNSAFE global path.
# TRUE point mass — robot_radius ≈ 0. No corridors are blocked.
# Soft inflation gradient steers paths away from walls but never
# makes any free cell lethal. ALL safety comes from MPC-CBF.
# =============================================================================

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: true
      allow_unknown: false

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false

      resolution: 0.01

      # True point mass: near-zero radius
      # Can't be exactly 0.0 (nav2 uses it for inscribed check)
      robot_radius: 0.01

      rolling_window: false
      track_unknown_space: false

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        # Soft cost gradient: half truck width
        # This doesn't block anything — just adds cost near walls
        # so A* prefers centered paths when possible.
        inflation_radius: 0.20
        # High scaling = costs drop off fast from obstacles.
        # Path is roughly centered but won't detour for clearance.
        cost_scaling_factor: 5.0